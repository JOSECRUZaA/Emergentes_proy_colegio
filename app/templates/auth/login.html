{% extends "base.html" %}

{% block title %}Iniciar Sesión - Colegio Villa Esperanza{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" style="margin-top: 100px;">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="contraseña" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="contraseña" name="contraseña" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="recordarme" name="recordarme">
                            <label class="form-check-label" for="recordarme">
                                Recuérdame en este dispositivo
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                    </form>
                    <hr>
                    <p class="text-center">
                        ¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a>
                    </p>
                </div>
            </div>
            <div class="alert alert-info mt-3">
                <strong>Credenciales de prueba:</strong><br>
                Email: admin@colegio.com<br>
                Contraseña: admin123
            </div>
        </div>
    </div>
</div>
{% endblock %}
