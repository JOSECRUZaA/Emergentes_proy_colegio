{% extends "base.html" %}
{% block title %}Nuevo Curso - Colegio Villa Esperanza{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-book"></i> Registrar Nuevo Curso</h1>
            <form method="POST" class="card">
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre del Curso *</label>
                            <input type="text" class="form-control" name="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Código del Curso *</label>
                            <input type="text" class="form-control" name="codigo" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Grado *</label>
                            <input type="text" class="form-control" name="grado" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Sección</label>
                            <input type="text" class="form-control" name="seccion">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Capacidad *</label>
                            <input type="number" class="form-control" name="capacidad" value="30" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Docente Responsable *</label>
                        <select name="docente_id" class="form-select" required>
                            <option value="">Seleccione un docente...</option>
                            {% for docente in docentes %}
                            <option value="{{ docente.id }}">{{ docente.usuario.nombre }} ({{ docente.especialidad or 'Sin esp.' }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('cursos.lista') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Registrar Curso</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
