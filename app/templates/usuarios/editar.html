{% extends "base.html" %}
{% block title %}Editar Usuario - Colegio Villa Esperanza{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-user-edit"></i> Editar Usuario: {{ usuario.nombre }}</h1>
            <form method="POST" class="card">
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre Completo *</label>
                            <input type="text" class="form-control" name="nombre" value="{{ usuario.nombre }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" value="{{ usuario.email }}" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Rol del Sistema *</label>
                            <select name="rol_id" class="form-select" required>
                                {% for rol in roles %}
                                <option value="{{ rol.id }}" {% if usuario.rol_id == rol.id %}selected{% endif %}>{{ rol.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="activo" id="activo" {% if usuario.activo %}checked{% endif %}>
                                <label class="form-check-label" for="activo">
                                    Cuenta Activa (Habilitada)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('usuarios.lista') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Actualizar Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
