{% extends "base.html" %}

{% block title %}Reportes - Promedios{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4"><i class="fas fa-chart-bar"></i> Reporte de Promedios</h1>

    <div class="card">
        <div class="card-body">
            {% if datos %}
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Estudiante</th>
                        <th>Promedio</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in datos %}
                    <tr>
                        <td>{{ item.estudiante }}</td>
                        <td>
                            <span class="badge bg-{% if item.promedio >= 60 %}success{% else %}danger{% endif %}">
                                {{ item.promedio }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="text-center text-muted">No hay datos disponibles</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
