{% extends "base.html" %}
{% block title %}Editar Inscripción - Colegio Villa Esperanza{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-edit"></i> Editar Inscripción</h1>
            <form method="POST" class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Estudiante</label>
                        <input type="text" class="form-control" value="{{ inscripcion.estudiante.usuario.nombre }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Curso</label>
                        <input type="text" class="form-control" value="{{ inscripcion.curso.nombre }} - {{ inscripcion.curso.grado }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado de la Inscripción *</label>
                        <select name="estado" class="form-select" required>
                            <option value="Activo" {% if inscripcion.estado == 'Activo' %}selected{% endif %}>Activo</option>
                            <option value="Retirado" {% if inscripcion.estado == 'Retirado' %}selected{% endif %}>Retirado</option>
                            <option value="Suspendido" {% if inscripcion.estado == 'Suspendido' %}selected{% endif %}>Suspendido</option>
                        </select>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('inscripciones.lista') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Actualizar Estado</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
