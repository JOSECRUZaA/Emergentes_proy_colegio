{% extends "base.html" %}
{% block title %}Registrar Calificación - Colegio Villa Esperanza{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-star"></i> Registrar Calificación</h1>
            <form method="POST" class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Estudiante *</label>
                        <select name="estudiante_id" class="form-select" required>
                            <option value="">Seleccione un estudiante...</option>
                            {% for estudiante in estudiantes %}
                            <option value="{{ estudiante.id }}">{{ estudiante.usuario.nombre }} (Matrícula: {{ estudiante.matricula }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Materia *</label>
                            <select name="materia_id" class="form-select" required>
                                <option value="">Seleccione materia...</option>
                                {% for materia in materias %}
                                <option value="{{ materia.id }}">{{ materia.nombre }} ({{ materia.codigo }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Docente Evaluador *</label>
                            <select name="docente_id" class="form-select" required>
                                <option value="">Seleccione docente...</option>
                                {% for docente in docentes %}
                                <option value="{{ docente.id }}">{{ docente.usuario.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 1</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial1">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 2</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial2">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 3</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Final</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_final">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Período Académico *</label>
                        <input type="text" class="form-control" name="periodo" placeholder="Ej. 1er Semestre 2026" required>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('calificaciones.lista') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Registrar Calificaciones</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
