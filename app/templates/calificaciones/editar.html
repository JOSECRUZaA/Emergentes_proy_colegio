{% extends "base.html" %}
{% block title %}Editar Calificación - Colegio Villa Esperanza{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-edit"></i> Editar Calificación</h1>
            <form method="POST" class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Estudiante</label>
                        <input type="text" class="form-control" value="{{ calificacion.estudiante.usuario.nombre }}" disabled>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Materia</label>
                            <input type="text" class="form-control" value="{{ calificacion.materia.nombre }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Período Académico</label>
                            <input type="text" class="form-control" value="{{ calificacion.periodo }}" disabled>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 1</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial1" value="{{ calificacion.nota_parcial1 or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 2</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial2" value="{{ calificacion.nota_parcial2 or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Parcial 3</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_parcial3" value="{{ calificacion.nota_parcial3 or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nota Final</label>
                            <input type="number" step="0.1" max="100" class="form-control" name="nota_final" value="{{ calificacion.nota_final or '' }}">
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('calificaciones.lista') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Actualizar Notas</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
